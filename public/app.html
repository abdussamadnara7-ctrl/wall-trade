<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- WT-VERSION-2.1 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wall-Trade — Pakistan Stock Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:   #09090f;
  --bg1:  #0f0f18;
  --bg2:  #141420;
  --bg3:  #1c1c2e;
  --bg4:  #242438;
  --rim:  rgba(255,255,255,0.06);
  --rim2: rgba(255,255,255,0.1);

  --t1: #eeedf8;
  --t2: rgba(238,237,248,0.5);
  --t3: rgba(238,237,248,0.25);
  --t4: rgba(238,237,248,0.1);

  /* green ramp */
  --ga: #5fffc0;
  --gb: #22d98a;
  --gc: #0faa66;

  /* purple ramp */
  --pa: #c4b5fd;
  --pb: #8b5cf6;
  --pc: #6d28d9;

  /* red */
  --ra: #ff8080;
  --rb: #ef4444;

  /* amber */
  --aa: #fbbf24;
  --ab: #d97706;

  /* blue */
  --ba: #93c5fd;
  --bb: #3b82f6;

  /* cyan — Hold signal */
  --ca: #67e8f9;
  --cb: #0891b2;

  --card-shadow: 0 0 0 1px var(--rim2), 0 2px 8px rgba(0,0,0,0.5), 0 12px 32px rgba(0,0,0,0.3);
  --float-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 4px 16px rgba(0,0,0,0.6), 0 24px 64px rgba(0,0,0,0.4);
}

html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Geist', 'SF Pro Display', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 0; }

/* ── GRADIENT TEXT ── */
.gx-green  { background: linear-gradient(130deg, var(--ga) 0%, var(--gb) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-purple { background: linear-gradient(130deg, var(--pa) 0%, var(--pb) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-red    { background: linear-gradient(130deg, var(--ra) 0%, var(--rb) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-amber  { background: linear-gradient(130deg, var(--aa) 0%, var(--ab) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-blue   { background: linear-gradient(130deg, var(--ba) 0%, var(--bb) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-beige  { background: linear-gradient(130deg, #e8dcc8 0%, #c4a882 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-coral  { background: linear-gradient(130deg, #fda4af 0%, #fb7185 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-cyan   { background: linear-gradient(130deg, #a5f3fc 0%, #22d3ee 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-white  { background: linear-gradient(130deg, #ffffff 30%, rgba(238,237,248,0.55) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-mixed  { background: linear-gradient(130deg, var(--ga) 0%, var(--pa) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

/* ── HEADER ── */
.hdr {
  position: sticky; top: 0; z-index: 80;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  background: rgba(9,9,15,0.9);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--rim);
}
.logo {
  font-size: 18px; font-weight: 700; letter-spacing: -0.04em;
  background: linear-gradient(130deg, var(--ga), var(--pa));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hdr-pill {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg2); border: 1px solid var(--rim2);
  border-radius: 50px; padding: 6px 12px 6px 7px;
  cursor: pointer; transition: background 0.15s;
  box-shadow: var(--card-shadow);
}
.hdr-pill:hover { background: var(--bg3); }
.pill-av {
  width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(95,255,192,0.15), rgba(139,92,246,0.15));
  border: 1px solid var(--rim2);
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: 700;
  background-clip: unset;
  color: var(--pa);
}
.pill-lbl { font-size: 12px; font-weight: 600; color: var(--t1); letter-spacing: -0.01em; }
.pill-arrow { font-size: 9px; color: var(--t3); }


/* ── LIVE TICKER BAR ── */
.ticker-bar {
  width: 100%; overflow: hidden;
  background: var(--bg1);
  border-bottom: 1px solid var(--rim);
  padding: 7px 0;
  position: relative;
}
.ticker-bar::before, .ticker-bar::after {
  content: '';
  position: absolute; top: 0; width: 40px; height: 100%; z-index: 2;
  pointer-events: none;
}
.ticker-bar::before { left: 0; background: linear-gradient(to right, var(--bg1), transparent); }
.ticker-bar::after  { right: 0; background: linear-gradient(to left, var(--bg1), transparent); }
.ticker-track {
  display: flex; gap: 0;
  animation: tickerScroll 30s linear infinite;
  width: max-content;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes tickerScroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  display: flex; align-items: center; gap: 6px;
  padding: 0 20px; white-space: nowrap;
  font-size: 11px; font-weight: 600; letter-spacing: -0.01em;
  cursor: pointer;
  border-right: 1px solid var(--rim);
}
.ticker-item:hover { background: rgba(255,255,255,0.03); }
.ticker-name { color: var(--t2); }
.ticker-price { color: var(--t1); }
.ticker-chg { font-size: 10px; font-weight: 700; }
.ticker-dot {
  width: 5px; height: 5px; border-radius: 50%;
  animation: tickerPulse 1.5s ease-in-out infinite;
}
@keyframes tickerPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* KSE-100 badge */
.kse-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px 0 20px; white-space: nowrap;
  font-size: 11px; font-weight: 700;
  border-right: 1px solid var(--rim);
}
.kse-label { color: var(--t3); letter-spacing: 0.05em; font-size: 9px; text-transform: uppercase; }
.kse-value { color: var(--t1); }

/* ── OVERLAY / SHEET ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; backdrop-filter: blur(8px); }
.overlay.on { display: block; }
.sheet {
  display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--bg1); border: 1px solid var(--rim2); border-bottom: none;
  border-radius: 22px 22px 0 0;
  padding: 0 0 44px; z-index: 201;
  max-height: 76vh; overflow-y: auto;
  box-shadow: var(--float-shadow);
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  scroll-behavior: smooth;
}
.sheet-bar { width: 32px; height: 3px; background: var(--rim2); border-radius: 2px; margin: 12px auto 20px; }
.sheet-ttl { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); padding: 0 20px 10px; }
.si { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; cursor: pointer; transition: background 0.1s; min-height: 64px; -webkit-tap-highlight-color: transparent; }
.si:hover, .si.on { background: rgba(255,255,255,0.03); }
.si:active { background: rgba(255,255,255,0.06); }
.si-l { display: flex; align-items: center; gap: 13px; }
.si-av {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(95,255,192,0.1), rgba(139,92,246,0.15));
  border: 1px solid var(--rim2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: var(--pa);
  box-shadow: var(--card-shadow);
}
.si-tick { font-size: 14px; font-weight: 600; color: var(--t1); letter-spacing: -0.02em; }
.si-name { font-size: 11px; color: var(--t3); margin-top: 1px; }
.si-pr { font-size: 13px; font-weight: 500; color: var(--t1); text-align: right; }
.si-ch { font-size: 11px; font-weight: 500; margin-top: 2px; text-align: right; }
.up { color: var(--gb); } .dn { color: var(--ra); }

/* ── HERO ── */
.hero { padding: 28px 20px 18px; }
.hero-meta { font-size: 11px; font-weight: 400; color: var(--t3); letter-spacing: 0.02em; margin-bottom: 16px; }
.hero-row { display: flex; justify-content: space-between; align-items: flex-start; }
.hero-ticker { font-size: 48px; font-weight: 700; letter-spacing: -0.05em; line-height: 0.95; }
.hero-sector {
  font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--t3); margin-top: 10px;
  display: flex; align-items: center; gap: 7px;
}
.hero-sector-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--pb); }
.hero-r { text-align: right; }
.hero-price { font-size: 36px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; }
.hero-cur { font-size: 11px; color: var(--t3); margin-bottom: 3px; letter-spacing: 0.04em; }
.hero-chg { font-size: 12px; font-weight: 600; margin-top: 6px; }

/* ── TABS ── */
.tabs {
  display: flex; padding: 0 20px;
  border-bottom: 1px solid var(--rim);
  margin-bottom: 24px;
}
.tab {
  font-size: 13px; font-weight: 500; color: var(--t3);
  padding: 12px 14px; cursor: pointer;
  border-bottom: 1.5px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  letter-spacing: -0.01em;
}
.tab.on {
  border-bottom-color: var(--gb);
  background: linear-gradient(130deg, var(--ga), var(--pa));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.tcontent { display: none; }
.tcontent.on { display: block; }

/* ── SUGGESTION CARD ── */
.sc-wrap { padding: 0 20px 4px; }
.sc { overflow: hidden; background: transparent; border: none; box-shadow: none; }
.sc-top { padding: 8px 0 20px; }
.sc-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--t3); margin-bottom: 18px; }
.sc-verdict-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.sc-verdict { font-size: 52px; font-weight: 700; letter-spacing: -0.03em; line-height: 0.9; }

.sc-sep { height: 1px; background: linear-gradient(90deg, transparent, var(--rim2) 25%, var(--rim2) 75%, transparent); margin: 4px 0; }
.sc-bot { padding: 18px 0 20px; }

.ai-row {
  display: flex; align-items: center; gap: 7px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 12px;
  background: linear-gradient(130deg, var(--pa), var(--pb));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.ai-orb {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--pa), var(--pb));
  animation: orb 2.5s ease-in-out infinite;
  box-shadow: 0 0 6px var(--pb);
}
@keyframes orb { 0%,100%{opacity:1;box-shadow:0 0 6px var(--pb)} 50%{opacity:0.4;box-shadow:none} }

.ai-headline {
  font-size: 16px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.45;
  background: linear-gradient(130deg, var(--t1) 40%, var(--t2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 10px;
}
.ai-body { font-size: 13px; color: var(--t2); line-height: 1.8; font-weight: 400; }
.ai-loading { display: flex; align-items: center; gap: 10px; color: var(--t3); font-size: 12px; }
.spin { width: 13px; height: 13px; border: 1.5px solid var(--rim2); border-top-color: var(--pb); border-radius: 50%; flex-shrink: 0; animation: rot .7s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }

/* ── SIGNALS ── */
.sigs-wrap { padding: 20px 20px 24px; }
.sec-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--t3); margin-bottom: 13px; }
.sigs { display: flex; flex-wrap: wrap; gap: 7px; }
.spill {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; font-weight: 500; color: var(--t2);
  background: var(--bg2); border: 1px solid var(--rim2);
  padding: 6px 12px; border-radius: 50px;
  box-shadow: 0 0 0 1px var(--rim), 0 2px 6px rgba(0,0,0,0.4);
  letter-spacing: -0.01em;
}
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* ── RATIO GRID ── */
.ratio-wrap { padding: 0 20px 4px; }
.rgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.rcard {
  background: var(--bg2); border: 1px solid var(--rim2);
  border-radius: 16px; padding: 15px 16px;
  box-shadow: var(--card-shadow);
}
.rlbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); margin-bottom: 8px; }
.rval { font-size: 22px; font-weight: 700; letter-spacing: -0.04em; line-height: 1; margin-bottom: 5px; }
.rctx { font-size: 10px; font-weight: 500; }

/* ── SCORES ── */
.scores-wrap { padding: 22px 20px 6px; }
.score-item { margin-bottom: 16px; }
.score-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.score-name { font-size: 13px; color: var(--t2); font-weight: 400; letter-spacing: -0.01em; }
.score-num { font-size: 12px; font-weight: 600; color: var(--t1); }
.strack { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.sfill { height: 100%; border-radius: 2px; transition: width 1.1s cubic-bezier(0.4,0,0.2,1); }

/* ── OVERALL ── */
.overall-wrap { padding: 14px 20px 28px; }
.ocard {
  background: var(--bg1); border: 1px solid var(--rim2);
  border-radius: 20px; padding: 22px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--float-shadow);
}
.onum { font-size: 64px; font-weight: 700; letter-spacing: -0.05em; line-height: 0.9; }
.oden { font-size: 20px; font-weight: 400; color: var(--t3); }
.oright { text-align: right; max-width: 172px; }
.o-eye { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); margin-bottom: 7px; }
.o-desc { font-size: 13px; color: var(--t2); line-height: 1.65; font-weight: 400; }

/* ── FACTORS ── */
.factors-wrap { padding: 0 20px 28px; }
.fi { display: flex; gap: 15px; padding: 18px 0; border-bottom: 1px solid var(--rim); }
.fi:last-child { border-bottom: none; padding-bottom: 4px; }
.fi-icon {
  width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
  background: linear-gradient(135deg, rgba(95,255,192,0.08), rgba(139,92,246,0.12));
  border: 1px solid var(--rim2);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: var(--card-shadow);
}
.fi-title { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; color: var(--t1); margin-bottom: 5px; }
.fi-desc { font-size: 12px; color: var(--t2); line-height: 1.75; }

/* ── ANSWER ── */
.ans-wrap { padding: 0 20px 8px; display: none; }
.ans-wrap.on { display: block; }
.ans-lbl {
  display: flex; align-items: center; gap: 6px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 10px;
  background: linear-gradient(130deg, var(--pa), var(--pb));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.ans-card {
  background: var(--bg2); border: 1px solid var(--rim2);
  border-radius: 16px; padding: 16px 18px;
  font-size: 13px; color: var(--t2); line-height: 1.8;
  box-shadow: var(--card-shadow);
}

/* ── ASK BAR ── */
.ask-bar {
  position: sticky; bottom: 0; z-index: 70;
  padding: 14px 20px 22px;
  background: rgba(9,9,15,0.94);
  backdrop-filter: blur(24px);
  border-top: 1px solid var(--rim);
}
.ask-row { display: flex; gap: 9px; }
.ask-in {
  flex: 1; background: var(--bg2); border: 1px solid var(--rim2);
  border-radius: 12px; color: var(--t1);
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 14px; padding: 12px 15px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: var(--card-shadow);
}
.ask-in::placeholder { color: var(--t4); }
.ask-in:focus { border-color: rgba(139,92,246,0.35); box-shadow: 0 0 0 3px rgba(139,92,246,0.07); }
.ask-btn {
  background: linear-gradient(130deg, #a78bfa, #7c3aed);
  color: #ffffff;
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 13px; font-weight: 700;
  padding: 12px 22px; border-radius: 12px;
  border: none; cursor: pointer;
  letter-spacing: -0.01em;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 2px 16px rgba(124,58,237,0.45), 0 1px 4px rgba(0,0,0,0.4);
  white-space: nowrap;
}
.ask-btn:hover { opacity: 0.88; }
.ask-btn:active { transform: scale(0.97); }
.ask-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.disc { font-size: 10px; color: var(--t3); text-align: center; padding: 6px 20px 28px; line-height: 1.7; }

/* ── BOTTOM NAV ── */
.bnav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  display: flex; align-items: center; justify-content: space-around;
  background: rgba(9,9,15,0.96); backdrop-filter: blur(20px);
  border-top: 1px solid var(--rim2);
  padding: 8px 0 max(env(safe-area-inset-bottom, 0px), 8px);
  z-index: 100;
}
.bnav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 16px; cursor: pointer;
  color: var(--t3); transition: color 0.15s;
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
}
.bnav-item svg { transition: color 0.15s; }
.bnav-item.on { color: var(--gb); }
.bnav-item:hover { color: var(--t2); }

/* push main content above bottom nav */
#root, #crypto-root, #forex-root { padding-bottom: 80px; }

/* smooth section transitions */
#root, #crypto-root, #forex-root {
  animation: fadeIn 0.18s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── CRYPTO GRID ── */
.crypto-grid { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.coin-card {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg1); border: 1px solid var(--rim);
  border-radius: 16px; padding: 14px 16px;
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
}
.coin-card:hover { background: var(--bg2); border-color: var(--rim2); }
.coin-left { display: flex; align-items: center; gap: 13px; }
.coin-av {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; letter-spacing: 0.04em;
  background: linear-gradient(135deg, rgba(95,255,192,0.08), rgba(139,92,246,0.12));
  border: 1px solid var(--rim2); color: var(--pa); flex-shrink: 0;
}
.coin-name { font-size: 15px; font-weight: 600; color: var(--t1); letter-spacing: -0.02em; }
.coin-full { font-size: 11px; color: var(--t3); margin-top: 2px; }
.coin-right { text-align: right; }
.coin-price { font-size: 15px; font-weight: 600; color: var(--t1); letter-spacing: -0.02em; }
.coin-chg { font-size: 12px; font-weight: 700; margin-top: 3px; }
.coin-verdict {
  display: inline-block; font-size: 9px; font-weight: 800; letter-spacing: 0.06em;
  padding: 3px 8px; border-radius: 4px; margin-top: 4px; text-transform: uppercase;
}
.verdict-bull { background: rgba(34,217,138,0.12); color: var(--gb); }
.verdict-bear { background: rgba(255,128,128,0.12); color: var(--ra); }
.verdict-neut { background: rgba(251,191,36,0.12); color: var(--aa); }

/* ── FOREX CARDS ── */
.forex-section { padding: 16px 20px; }
.forex-header { padding: 12px 0 16px; }
.forex-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; color: var(--t1); }

.fx-grid { display: flex; flex-direction: column; gap: 10px; }

.fx-rate-block { text-align: right; }

.fx-context { font-size: 12px; color: var(--t3); line-height: 1.55; padding-top: 8px; border-top: 1px solid var(--rim); margin-top: 8px; }
.fx-loading { text-align: center; padding: 60px 20px; color: var(--t3); font-size: 14px; }
.sbp-note { margin-top: 12px; padding: 12px 16px; background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.15); border-radius: 12px; font-size: 12px; color: var(--t2); line-height: 1.6; }

/* ── GAUGE ── */

/* ── INSIGHT CARDS — left border accent ── */

  display: flex; align-items: center; gap: 14px;

  padding: 11px 14px;
  transition: background 0.15s;
}
.insight-card:hover { background: rgba(255,255,255,0.04); }
.insight-icon-wrap {
  width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; background: transparent;
}
.insight-right { flex: 1; min-width: 0; }

  font-size: 14px; font-weight: 700; letter-spacing: -0.02em; line-height: 1;
  margin-bottom: 3px;
}
.insight-label { font-size: 11px; color: var(--t2); line-height: 1.45; font-weight: 400; }
</style>

<script>
// ── AUTH ──────────────────────────────────────────────────
// AUTH_ENFORCED = false  →  app loads for everyone (current state)
// AUTH_ENFORCED = true   →  set this once Supabase is live and users are signing up
const AUTH_ENFORCED = true;

(function() {
  if (!AUTH_ENFORCED) return; // gate is off — app loads normally

  const token = localStorage.getItem('wt_token');
  if (!token) {
    window.location.href = '/?signin=1';
    return;
  }

  // Show signed-in user in header
  const email = localStorage.getItem('wt_email');
  if (email) {
    const logo = document.querySelector('.logo');
    if (logo) {
      const badge = document.createElement('div');
      badge.style.cssText = 'font-size:9px;font-weight:600;color:rgba(34,217,138,0.6);letter-spacing:0.06em;margin-top:2px;';
      badge.textContent = '● ' + email.split('@')[0];
      logo.parentNode.insertBefore(badge, logo.nextSibling);
    }
  }
})();

function signOut() {
  localStorage.removeItem('wt_token');
  localStorage.removeItem('wt_email');
  localStorage.removeItem('wt_refresh');
  window.location.href = '/';
}

// ── POPULAR PSX STOCKS (for quick browse) ──────────────────
const POPULAR = {
  'Energy & Oil':    ['OGDC','PPL','PSO','MARI','APL','HASCOL','SNGP','SSGC'],
  'Banking':         ['HBL','MCB','UBL','NBP','ABL','BAFL','BAHL','MEBL','FABL'],
  'Fertiliser':      ['ENGROH','FFBL','FFC','EFERT'],
  'Cement':          ['LUCK','MLCF','CHCC','DGKC','PIOC','FCCL'],
  'Technology':      ['TRG','SYS','NETSOL'],
  'Other':           ['PAKT','PNSC']
};

const ALL_TICKERS = Object.values(POPULAR).flat();

// ── STATE ──────────────────────────────────────────────────
let cur = 'OGDC';
let tab = 'overview';
let stockCache = {};      // stockData per ticker
let verdictCache = {};    // AI verdict per ticker
let livePrices = {};      // live prices from prices.js

// ── MACRO CONTEXT (static, updated periodically) ──────────
const MACRO = [
  "SBP Policy Rate: 10.50% p.a. | Ceiling: 11.50% | Floor: 9.50%",
  "Monetary policy: Aggressive easing cycle from 22% peak to 10.50%",
  "IMF EFF programme: Active — energy reforms, circular debt reduction, DISCO privatisation",

  "Iran-US tensions: elevated — Strait of Hormuz oil supply risk",
  "Current account: near-balanced, FX reserves recovering",
  "PSX KSE-100: at record highs — market re-rating on macro stabilisation",
  "Key risks: oil price spike, IMF slippage, political instability"
].join(". ");

// ── COLOUR HELPERS ─────────────────────────────────────────
const vGrad  = t => ({Positive:'gx-green',Neutral:'gx-beige',Caution:'gx-red'}[t]||'gx-white');
const scGrad = v => v>=7?`linear-gradient(130deg,var(--ga),var(--gb))`:v>=5?`linear-gradient(130deg,#fbbf24,#d97706)`:`linear-gradient(130deg,var(--ra),var(--rb))`;
const scTG   = v => v>=7?'sc-green':v>=5?'sc-amber':'sc-red';
const rTG    = c => c==='green'?'rc-green':c==='red'?'rc-red':'rc-amber';
const sdC    = t => ({green:'var(--gb)',amber:'var(--aa)',red:'var(--ra)',purple:'var(--pb)'}[t]||'var(--t3)');

// ── GAUGE ──────────────────────────────────────────────────
function gaugeArc(score) {
  const pct = Math.min(score / 10, 1);
  const W=140, H=90, cx=70, cy=76, R=50, n=22;
  const id = 'gg' + Math.random().toString(36).slice(2,8);
  let dots = '';
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1);
    const angle = Math.PI + t * Math.PI;
    const x = cx + R * Math.cos(angle);
    const y = cy + R * Math.sin(angle);
    const lit = t <= pct;
    const col = t < 0.42 ? '#ff4444' : t < 0.58 ? '#ffaa00' : '#00e87a';
    const r = lit ? 5 : 4;
    const op = lit ? '1' : '0.13';
    const glow = lit ? ` filter="url(#${id}-glow)"` : '';
    dots += `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r}" fill="${col}" opacity="${op}"${glow}/>`;
  }
  const na = Math.PI + pct * Math.PI;
  const nx = (cx + 36 * Math.cos(na)).toFixed(2);
  const ny = (cy + 36 * Math.sin(na)).toFixed(2);
  return `<div class="gauge-wrap">
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="none">
      <defs><filter id="${id}-glow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter></defs>
      ${dots}
      <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#e8eeff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="#1c1c2e" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
      <circle cx="${cx}" cy="${cy}" r="2.5" fill="#ffffff"/>
    </svg>
    <div class="gauge-label">${score} / 10</div>
  </div>`;
}

// ── RENDER ─────────────────────────────────────────────────
function render(ticker, stockData, verdict) {
  const lp = livePrices[ticker];
  const price   = lp?.price || stockData?.price || '—';
  const change  = lp?.change || stockData?.change || '0';
  const dir     = lp?.dir || stockData?.dir || 'up';
  const name    = stockData?.name || ticker;
  const sector  = stockData?.sector || 'Pakistan Stock Exchange';
  const vtype   = verdict?.verdict || 'Neutral';
  const vscore  = verdict?.score || 5;
  const insights = verdict?.insights || [];
  const signals  = verdict?.signals || [];
  const scores   = verdict?.scores || {};
  const factors  = verdict?.factors || [];
  const ratios   = stockData ? buildRatios(stockData) : {};

  document.getElementById('root').innerHTML = `
  <div class="hero">
    <div class="hero-meta">${name}</div>
    <div class="hero-row">
      <div>
        <div class="hero-ticker gx-white">${ticker}</div>
        <div class="hero-sector"><div class="hero-sector-dot"></div>${sector}</div>
      </div>
      <div class="hero-r">
        <div class="hero-cur">PKR</div>
        <div class="hero-price gx-white" id="live-price">${price}</div>
        <div class="hero-chg ${dir === 'up' ? 'up' : 'dn'}" id="live-chg">${dir === 'up' ? '+' : ''}${change}% today</div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab ${tab==='overview'?'on':''}" onclick="setTab('overview')">Overview</div>
    <div class="tab ${tab==='financials'?'on':''}" onclick="setTab('financials')">Financials</div>
    <div class="tab ${tab==='factors'?'on':''}" onclick="setTab('factors')">Key factors</div>
  </div>

  <div class="tcontent ${tab==='overview'?'on':''}" id="tc-overview">
    <div class="sc-wrap">
      <div class="sc">
        <div class="sc-top">
          <div class="sc-eyebrow">Wall-Trade suggestion</div>
          <div class="sc-verdict-row">
            <div class="sc-verdict ${vGrad(vtype)}">${vtype}</div>
            ${gaugeArc(vscore)}
          </div>
          <div class="insights">
            ${insights.map(ins => {
              const borderMap = {green:'var(--gb)',amber:'var(--aa)',red:'var(--ra)',purple:'var(--pb)',blue:'var(--bb)'};
              const gradMap   = {green:'linear-gradient(130deg,#5fffc0,#22d98a)',amber:'linear-gradient(130deg,#fbbf24,#d97706)',red:'linear-gradient(130deg,#ff8080,#ef4444)',purple:'linear-gradient(130deg,#c4b5fd,#8b5cf6)',blue:'linear-gradient(130deg,#93c5fd,#3b82f6)'};
              return `<div class="insight-card" style="border-left-color:${borderMap[ins.color]||borderMap.purple}">
                <div class="insight-icon-wrap">${ins.icon}</div>
                <div class="insight-right">
                  <div class="insight-value" style="background:${gradMap[ins.color]||gradMap.purple};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${ins.value}</div>
                  <div class="insight-label">${ins.label}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
        <div class="sc-sep"></div>
        <div class="sc-bot">
          <div class="ai-row"><div class="ai-orb"></div>AI verdict</div>
          ${verdict
            ? `<div class="ai-headline">${verdict.headline}</div><div class="ai-body">${verdict.body}</div>`
            : `<div class="ai-loading"><div class="spin"></div>Analysing ${ticker} with live Pakistan market data…</div>`}
        </div>
      </div>
    </div>
    ${signals.length ? `
    <div class="sigs-wrap">
      <div class="sec-lbl">Key signals</div>
      <div class="sigs">
        ${signals.map(sg=>`<div class="spill"><div class="sdot" style="background:${sdC(sg.type)}"></div>${sg.label}</div>`).join('')}
      </div>
    </div>` : ''}
  </div>

  <div class="tcontent ${tab==='financials'?'on':''}" id="tc-financials">
    <div class="ratio-wrap" style="padding-top:22px;">
      <div class="sec-lbl">Financial ratios</div>
      <div class="rgrid">
        ${Object.entries(ratios).map(([n,r])=>`
          <div class="rcard">
            <div class="rlbl">${n}</div>
            <div class="rval ${rTG(r.c)}">${r.v}</div>
            <div class="rctx ${rTG(r.c)}">${r.ctx}</div>
          </div>`).join('')}
      </div>
    </div>
    ${Object.keys(scores).length ? `
    <div class="scores-wrap">
      <div class="sec-lbl">Score breakdown</div>
      ${Object.entries(scores).map(([n,v])=>`
        <div class="score-item">
          <div class="score-top">
            <span class="score-name">${n}</span>
            <span class="score-num ${scTG(v)}">${v} / 10</span>
          </div>
          <div class="strack"><div class="sfill" style="width:${v*10}%;background:${scGrad(v)}"></div></div>
        </div>`).join('')}
    </div>
    <div class="overall-wrap">
      <div class="ocard">
        <div>
          <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;">Score</div>
          <span class="onum ${scTG(vscore)}">${vscore}</span><span class="oden"> /10</span>
        </div>
        <div class="oright">
          <div class="o-eye">Summary</div>
          <div class="o-desc">${verdict?.summary || 'Analysis loading...'}</div>
        </div>
      </div>
    </div>` : ''}
  </div>

  <div class="tcontent ${tab==='factors'?'on':''}" id="tc-factors">
    <div class="factors-wrap" style="padding-top:22px;">
      ${factors.map(f=>`<div class="fi">
        <div class="fi-icon">${f.icon}</div>
        <div><div class="fi-title">${f.title}</div><div class="fi-desc">${f.detail}</div></div>
      </div>`).join('')}
    </div>
  </div>

  <div class="ans-wrap" id="ans-wrap">
    <div class="ans-lbl"><div class="ai-orb"></div>AI answer</div>
    <div class="ans-card" id="ans-card"></div>
  </div>
  <div class="ask-bar">
    <div class="ask-row">
      <input class="ask-in" id="ask-in" type="text" placeholder="Ask anything about ${ticker}…"/>
      <button class="ask-btn" id="ask-btn" onclick="doAsk()">Ask</button>
    </div>
  </div>
  <div class="disc">Wall-Trade provides financial information and analysis for educational purposes only. Not investment advice. Not SECP registered. Signals (Positive / Neutral / Caution) are analytical indicators, not instructions to buy or sell.</div>
  `;
  document.getElementById('ask-in').addEventListener('keydown', e => { if(e.key==='Enter') doAsk(); });
}

// ── SECTOR MAP (frontend mirror of backend frameworks) ──────
const TICKER_SECTOR = {
  HBL:'BANKING', MCB:'BANKING', UBL:'BANKING', NBP:'BANKING',
  ABL:'BANKING', BAFL:'BANKING', BAHL:'BANKING', MEBL:'BANKING', FABL:'BANKING',
  OGDC:'ENERGY_EP', PPL:'ENERGY_EP', MARI:'ENERGY_EP',
  PSO:'OMC', APL:'OMC', HASCOL:'OMC',
  EFERT:'FERTILISER', FFC:'FERTILISER', FFBL:'FERTILISER',
  LUCK:'CEMENT', MLCF:'CEMENT', CHCC:'CEMENT', DGKC:'CEMENT',
  SYS:'TECH', TRG:'TECH', NETSOL:'TECH',
  ENGROH:'CONGLOMERATE'
};

// ── BUILD RATIOS FROM STOCK DATA (SECTOR-AWARE) ─────────────
function buildRatios(s) {
  const sector = TICKER_SECTOR[cur] || 'GENERAL';
  const ratios = {};

  // Helper: colour based on value vs threshold
  const c = (val, good, warn) => {
    const n = parseFloat(val);
    if (isNaN(n)) return 'amber';
    return n >= good ? 'green' : n >= warn ? 'amber' : 'red';
  };
  const ci = (val, bad, warn) => { // inverted — lower is better
    const n = parseFloat(val);
    if (isNaN(n)) return 'amber';
    return n <= bad ? 'green' : n <= warn ? 'amber' : 'red';
  };

  if (sector === 'BANKING') {
    if (s.pb && s.pb !== 'N/A')           ratios['P/B Ratio']    = { v: s.pb + '×',   c: ci(s.pb, 1.5, 2.5),       ctx: 'Primary valuation — book value multiple' };
    if (s.roe && s.roe !== 'N/A')         ratios['ROE']          = { v: s.roe,         c: c(s.roe, 18, 12),          ctx: 'Return on equity — core profitability' };
    if (s.divYield && s.divYield !== 'N/A') ratios['Div Yield']  = { v: s.divYield,    c: c(s.divYield, 6, 4),       ctx: 'Annual dividend yield' };
    if (s.netMargin && s.netMargin !== 'N/A') ratios['Net Margin'] = { v: s.netMargin, c: c(s.netMargin, 25, 15),    ctx: 'Net profit margin' };
    if (s.eps && s.eps !== 'N/A')         ratios['EPS']          = { v: 'PKR ' + s.eps, c: 'green',                  ctx: 'Earnings per share' };
    // Note: D/E and current ratio intentionally excluded for banks

  } else if (sector === 'ENERGY_EP') {
    if (s.pe && s.pe !== 'N/A')           ratios['P/E Ratio']    = { v: s.pe + '×',   c: ci(s.pe, 10, 15),           ctx: 'E&P trades at discount — <10x is attractive' };
    if (s.divYield && s.divYield !== 'N/A') ratios['Div Yield']  = { v: s.divYield,   c: c(s.divYield, 6, 4),        ctx: 'Income investors target >6% yield' };
    if (s.netMargin && s.netMargin !== 'N/A') ratios['Net Margin'] = { v: s.netMargin, c: c(s.netMargin, 35, 20),    ctx: 'High margin sector — <20% is weak' };
    if (s.roe && s.roe !== 'N/A')         ratios['ROE']          = { v: s.roe,         c: c(s.roe, 15, 8),           ctx: 'Return on equity' };
    if (s.fcfYield && s.fcfYield !== 'N/A') ratios['FCF Yield']  = { v: s.fcfYield,   c: c(s.fcfYield, 5, 2),       ctx: 'Free cash flow yield — watch vs earnings' };
    if (s.eps && s.eps !== 'N/A')         ratios['EPS']          = { v: 'PKR ' + s.eps, c: 'green',                  ctx: 'Earnings per share' };

  } else if (sector === 'OMC') {
    if (s.pe && s.pe !== 'N/A')           ratios['P/E Ratio']    = { v: s.pe + '×',   c: ci(s.pe, 10, 15),           ctx: 'Price to earnings' };
    if (s.pb && s.pb !== 'N/A')           ratios['P/B Ratio']    = { v: s.pb + '×',   c: ci(s.pb, 1.5, 2.5),        ctx: 'Price to book value' };
    if (s.netMargin && s.netMargin !== 'N/A') ratios['Net Margin'] = { v: s.netMargin, c: c(s.netMargin, 3, 1),      ctx: 'OMC margins are thin — 1-3% is normal' };
    if (s.debtToEquity && s.debtToEquity !== 'N/A') ratios['Debt/Equity'] = { v: s.debtToEquity, c: ci(s.debtToEquity, 1, 2), ctx: 'Working capital leverage' };
    if (s.currentRatio && s.currentRatio !== 'N/A') ratios['Current Ratio'] = { v: s.currentRatio + '×', c: c(s.currentRatio, 1.2, 1), ctx: 'Short-term liquidity' };

  } else if (sector === 'FERTILISER') {
    if (s.pe && s.pe !== 'N/A')           ratios['P/E Ratio']    = { v: s.pe + '×',   c: ci(s.pe, 10, 15),           ctx: 'Price to earnings' };
    if (s.divYield && s.divYield !== 'N/A') ratios['Div Yield']  = { v: s.divYield,   c: c(s.divYield, 8, 5),        ctx: 'Core investment case — target >8%' };
    if (s.roe && s.roe !== 'N/A')         ratios['ROE']          = { v: s.roe,         c: c(s.roe, 25, 15),          ctx: 'High ROE = pricing power + gas advantage' };
    if (s.netMargin && s.netMargin !== 'N/A') ratios['Net Margin'] = { v: s.netMargin, c: c(s.netMargin, 20, 10),    ctx: 'Net profit margin' };
    if (s.debtToEquity && s.debtToEquity !== 'N/A') ratios['Debt/Equity'] = { v: s.debtToEquity, c: ci(s.debtToEquity, 0.5, 1.5), ctx: 'Balance sheet strength' };

  } else if (sector === 'CEMENT') {
    if (s.pe && s.pe !== 'N/A')           ratios['P/E Ratio']    = { v: s.pe + '×',   c: ci(s.pe, 12, 20),           ctx: 'Cyclical sector — valuation swings' };
    if (s.netMargin && s.netMargin !== 'N/A') ratios['Net Margin'] = { v: s.netMargin, c: c(s.netMargin, 12, 6),     ctx: 'Coal-sensitive — margins swing sharply' };
    if (s.debtToEquity && s.debtToEquity !== 'N/A') ratios['Debt/Equity'] = { v: s.debtToEquity, c: ci(s.debtToEquity, 1, 2), ctx: 'High leverage risky in downturns' };
    if (s.roe && s.roe !== 'N/A')         ratios['ROE']          = { v: s.roe,         c: c(s.roe, 15, 8),           ctx: 'Return on equity' };
    if (s.grossMargin && s.grossMargin !== 'N/A') ratios['Gross Margin'] = { v: s.grossMargin, c: c(s.grossMargin, 25, 12), ctx: 'Gross profit margin' };

  } else if (sector === 'TECH') {
    if (s.pe && s.pe !== 'N/A')           ratios['P/E Ratio']    = { v: s.pe + '×',   c: ci(s.pe, 20, 35),           ctx: 'Growth premium — higher P/E acceptable' };
    if (s.roe && s.roe !== 'N/A')         ratios['ROE']          = { v: s.roe,         c: c(s.roe, 15, 8),           ctx: 'Return on equity' };
    if (s.netMargin && s.netMargin !== 'N/A') ratios['Net Margin'] = { v: s.netMargin, c: c(s.netMargin, 15, 10),    ctx: 'Higher margin = scalable business' };
    if (s.debtToEquity && s.debtToEquity !== 'N/A') ratios['Debt/Equity'] = { v: s.debtToEquity, c: ci(s.debtToEquity, 0.3, 1), ctx: 'Low debt = quality tech company' };

  } else if (sector === 'CONGLOMERATE') {
    if (s.pe && s.pe !== 'N/A')           ratios['P/E Ratio']    = { v: s.pe + '×',   c: ci(s.pe, 12, 18),           ctx: 'Holding company — sum-of-parts logic' };
    if (s.pb && s.pb !== 'N/A')           ratios['P/B Ratio']    = { v: s.pb + '×',   c: ci(s.pb, 1.5, 2.5),        ctx: 'Discount to NAV is normal' };
    if (s.divYield && s.divYield !== 'N/A') ratios['Div Yield']  = { v: s.divYield,   c: c(s.divYield, 5, 3),        ctx: 'Dividend from subsidiaries (mainly EFERT)' };
    if (s.roe && s.roe !== 'N/A')         ratios['ROE']          = { v: s.roe,         c: c(s.roe, 12, 7),           ctx: 'Return on equity' };

  } else {
    // GENERAL fallback
    if (s.pe && s.pe !== 'N/A')           ratios['P/E Ratio']    = { v: s.pe + '×',   c: ci(s.pe, 15, 25),           ctx: 'Price to earnings' };
    if (s.pb && s.pb !== 'N/A')           ratios['P/B Ratio']    = { v: s.pb + '×',   c: ci(s.pb, 2, 4),             ctx: 'Price to book value' };
    if (s.divYield && s.divYield !== 'N/A') ratios['Div Yield']  = { v: s.divYield,   c: c(s.divYield, 5, 3),        ctx: 'Annual dividend yield' };
    if (s.roe && s.roe !== 'N/A')         ratios['ROE']          = { v: s.roe,         c: c(s.roe, 15, 8),           ctx: 'Return on equity' };
    if (s.netMargin && s.netMargin !== 'N/A') ratios['Net Margin'] = { v: s.netMargin, c: c(s.netMargin, 15, 5),     ctx: 'Net profit margin' };
    if (s.currentRatio && s.currentRatio !== 'N/A') ratios['Current Ratio'] = { v: s.currentRatio + '×', c: c(s.currentRatio, 1.5, 1), ctx: 'Short-term liquidity' };
    if (s.debtToEquity && s.debtToEquity !== 'N/A') ratios['Debt/Equity'] = { v: s.debtToEquity, c: ci(s.debtToEquity, 0.5, 1.5), ctx: 'Financial leverage' };
  }

  return ratios;
}

// ── LOAD STOCK DYNAMICALLY ─────────────────────────────────
async function loadStock(ticker) {
  // Check cache first
  if (stockCache[ticker] && verdictCache[ticker]) {
    render(ticker, stockCache[ticker], verdictCache[ticker]);
    return;
  }

  renderLoading(ticker);

  try {
    const res = await fetch('/.netlify/functions/stock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker, macroContext: MACRO })
    });

    if (res.status === 404) {
      const err = await res.json();
      renderError(ticker, err.error);
      return;
    }

    if (!res.ok) throw new Error('Server error');

    const data = await res.json();
    stockCache[ticker]  = data.stockData;
    verdictCache[ticker] = data.verdict;
    render(ticker, data.stockData, data.verdict);

    // Update pill with latest price
    if (data.stockData?.price) {
      livePrices[ticker] = {
        price:  data.stockData.price,
        change: data.stockData.change,
        dir:    data.stockData.dir
      };
    }
  } catch(e) {
    renderError(ticker, 'Unable to connect. Please check your connection and try again.');
  }
}

async function doAsk() {
  const inp = document.getElementById('ask-in'), btn = document.getElementById('ask-btn');
  const q = inp.value.trim(); if (!q) return;
  btn.disabled = true; btn.textContent = '…';
  const aw = document.getElementById('ans-wrap'), ac = document.getElementById('ans-card');
  aw.classList.add('on'); ac.textContent = 'Thinking…';
  const s = stockCache[cur];
  try {
    const res = await fetch('/.netlify/functions/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'question', ticker: cur, question: q,
        ratios: s ? Object.entries(buildRatios(s)).map(([k,v])=>`${k}: ${v.v}`).join(', ') : '',
        macro: MACRO
      })
    });
    if (res.status === 429) { ac.textContent = 'Usage limit reached. Please try again in an hour.'; btn.disabled = false; btn.textContent = 'Ask'; return; }
    const data = await res.json();
    ac.textContent = data.content?.map(i => i.text||'').join('') || 'Could not get a response.';
  } catch(e) { ac.textContent = 'Could not connect — please try again.'; }
  btn.disabled = false; btn.textContent = 'Ask'; inp.value = '';
}

// ── SHEET (STOCK PICKER) ──────────────────────────────────
function buildSheet() {
  const list = document.getElementById('sheet-list');
  list.innerHTML = '';

  // Search box
  const searchDiv = document.createElement('div');
  searchDiv.style.cssText = 'padding:12px 20px 4px';
  searchDiv.innerHTML = `<input id="sheet-search" type="text" placeholder="Search any PSX ticker (e.g. HBL, LUCK)…" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#eeedf8;font-size:13px;padding:10px 14px;outline:none;font-family:inherit">`;
  list.appendChild(searchDiv);

  // Sector groups
  Object.entries(POPULAR).forEach(([sector, tickers]) => {
    const secDiv = document.createElement('div');
    secDiv.innerHTML = `<div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(238,237,248,0.25);padding:14px 20px 6px">${sector}</div>`;
    list.appendChild(secDiv);

    tickers.forEach(ticker => {
      const d = document.createElement('div');
      d.className = 'si' + (ticker === cur ? ' on' : '');
      d.dataset.ticker = ticker;
      const lp = livePrices[ticker];
      const priceDisplay = lp ? `PKR ${lp.price}` : '—';
      const chgDisplay   = lp ? `${lp.dir==='up'?'+':''}${lp.change}%` : '';
      const chgClass     = lp ? (lp.dir==='up'?'up':'dn') : '';
      d.innerHTML = `<div class="si-l"><div class="si-av">${ticker.slice(0,3)}</div><div><div class="si-tick">${ticker}</div><div class="si-name">${getShortName(ticker)}</div></div></div><div><div class="si-pr">${priceDisplay}</div><div class="si-ch ${chgClass}">${chgDisplay}</div></div>`;

      // Click handler (desktop)
      d.addEventListener('click', () => select(ticker));

      // Touch handler — only fire if finger didn't scroll (movement < 8px)
      let touchStartY = 0;
      d.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      d.addEventListener('touchend', (e) => {
        const moved = Math.abs(e.changedTouches[0].clientY - touchStartY);
        if (moved < 8) { // true tap, not a scroll
          e.preventDefault();
          select(ticker);
        }
      }, { passive: false });

      list.appendChild(d);
    });
  });

  // Search functionality
  setTimeout(() => {
    const searchInput = document.getElementById('sheet-search');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const q = e.target.value.toUpperCase().trim();
        if (!q) {
          list.querySelectorAll('.si').forEach(el => el.style.display = '');
          list.querySelectorAll('[style*="font-size:9px"]').forEach(el => el.style.display = '');
          return;
        }
        list.querySelectorAll('.si').forEach(el => {
          el.style.display = el.dataset.ticker?.includes(q) ? '' : 'none';
        });
        list.querySelectorAll('[style*="font-size:9px"]').forEach(el => el.style.display = 'none');

        // If not in popular list, show "Search PSX" option
        const found = list.querySelectorAll('.si:not([style*="none"])').length;
        let customEl = document.getElementById('custom-search-item');
        if (!found && q.length >= 2) {
          if (!customEl) {
            customEl = document.createElement('div');
            customEl.id = 'custom-search-item';
            customEl.className = 'si';
            list.appendChild(customEl);
          }
          customEl.innerHTML = `<div class="si-l"><div class="si-av" style="background:rgba(139,92,246,0.15);color:#8b5cf6">PSX</div><div><div class="si-tick">${q}</div><div class="si-name">Search PSX for ${q}</div></div></div><div style="font-size:10px;color:rgba(238,237,248,0.3)">↵ Search</div>`;
          customEl.style.display = '';
          const handler = (e) => { e.preventDefault(); select(q); };
          customEl.onclick = handler;
          customEl.ontouchend = handler;
        } else if (customEl) {
          customEl.style.display = 'none';
        }
      });
    }
  }, 50);
}

async function fetchLivePrices() {
  try {
    const res = await fetch('/.netlify/functions/prices', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tickers: ALL_TICKERS })
    });
    if (!res.ok) return;
    const data = await res.json();
    if (data.prices) {
      Object.assign(livePrices, data.prices);
      updateTickerBar(data.prices, data.kse100);
      if (livePrices[cur]) renderLivePrice(cur);
    }
  } catch(e) {}
}

function renderLivePrice(ticker) {
  const lp = livePrices[ticker];
  if (!lp) return;
  const priceEl = document.getElementById('live-price');
  const chgEl   = document.getElementById('live-chg');
  if (priceEl) priceEl.textContent = lp.price;
  if (chgEl) {
    chgEl.textContent = `${lp.dir==='up'?'+':''}${lp.change}% today`;
    chgEl.className = `hero-chg ${lp.dir==='up'?'up':'dn'}`;
  }
}

function updateTickerBar(prices, kse100) {
  if (kse100) {
    const kseVal = document.getElementById('kse-val');
    const kseChg = document.getElementById('kse-chg');
    if (kseVal) kseVal.textContent = kse100.price;
    if (kseChg) {
      kseChg.textContent = `${parseFloat(kse100.change)>=0?'+':''}${kse100.change}%`;
      kseChg.className = `ticker-chg ${kse100.dir==='up'?'up':'dn'}`;
    }
  }

  const track = document.getElementById('ticker-track');
  if (!track) return;

  const items = ALL_TICKERS.map(ticker => {
    const lp = prices[ticker];
    if (!lp) return '';
    const isUp = lp.dir === 'up';
    return `<div class="ticker-item" onclick="select('${ticker}')">
      <div class="ticker-dot" style="background:${isUp?'var(--gb)':'var(--ra)'}"></div>
      <span class="ticker-name">${ticker}</span>
      <span class="ticker-price">PKR ${lp.price}</span>
      <span class="ticker-chg ${isUp?'up':'dn'}">${isUp?'+':''}${lp.change}%</span>
    </div>`;
  }).filter(Boolean).join('');

  const kseHtml = kse100 ? `<div class="kse-badge"><span class="kse-label">KSE-100</span><span class="kse-value" id="kse-val">${kse100.price}</span><span class="ticker-chg ${kse100.dir==='up'?'up':'dn'}" id="kse-chg">${parseFloat(kse100.change)>=0?'+':''}${kse100.change}%</span></div>` : '';

  track.innerHTML = kseHtml + items + items;
}

        <div style="text-align:right">
          <div style="font-size:26px;font-weight:700;letter-spacing:-0.03em;color:var(--t1)">$${coinInfo.price || '—'}</div>
          <div style="font-size:13px;font-weight:700;margin-top:4px" class="${coinInfo.dir === 'up' ? 'up' : 'dn'}">${coinInfo.dir === 'up' ? '+' : ''}${coinInfo.change24h || ''}</div>
        </div>
      </div>
      <div id="coin-verdict-area">
        <div style="display:flex;align-items:center;gap:10px;padding:20px 0;color:var(--t3)">
          <div class="spin" style="width:16px;height:16px;border:2px solid var(--rim2);border-top-color:var(--gb);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0"></div>
          Generating AI verdict for ${sym}…
        </div>
      </div>
    </div>
    <div style="padding:0 20px">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:12px">MARKET DATA</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
        ${[['Market Cap',coinInfo.marketCap||'—'],['24h Volume',coinInfo.volume24h||'—'],['Market Rank','#'+(coinInfo.marketCapRank||'—')],['ATH Change',coinInfo.athChange||'—'],['7d Change',coinInfo.change7d||'—'],['30d Change',coinInfo.change30d||'—']].map(([l,v])=>`
        <div style="background:var(--bg1);border:1px solid var(--rim);border-radius:12px;padding:12px 14px">
          <div style="font-size:10px;font-weight:600;color:var(--t3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px">${l}</div>
          <div style="font-size:15px;font-weight:600;color:var(--t1)">${v}</div>
        </div>`).join('')}
      </div>
    </div>
    <div style="padding:0 20px 16px">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:10px">ASK AI ABOUT ${sym}</div>
      <div style="display:flex;gap:8px">
        <input id="crypto-q" type="text" placeholder="e.g. How does VIX affect ${sym}?"
          style="flex:1;background:var(--bg2);border:1px solid var(--rim2);border-radius:12px;color:var(--t1);font-size:14px;padding:12px 16px;outline:none;font-family:inherit"/>
        <button onclick="askCrypto('${sym}')" style="background:linear-gradient(130deg,var(--gb),var(--pb));color:#fff;border:none;border-radius:12px;padding:12px 18px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">Ask</button>
      </div>
      <div id="crypto-answer" style="margin-top:12px;font-size:14px;color:var(--t2);line-height:1.7"></div>
    </div>
    <div class="disc">Crypto data: FMP · Not investment advice · Prices in USD</div>`;

  // Fetch AI verdict
  try {
    const res = await fetch('/.netlify/functions/crypto', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verdict', symbol: sym })
    });
    const data = await res.json();
    const vArea = document.getElementById('coin-verdict-area');
    if (!vArea) return;

    if (data.verdict) {
      cryptoVerdictCache[sym] = data;
      const v = data.verdict;
      const colMap = { Bullish: 'var(--gb)', Bearish: 'var(--ra)', Neutral: 'var(--aa)' };
      const bgMap  = { Bullish: 'rgba(34,217,138,0.07)', Bearish: 'rgba(255,128,128,0.07)', Neutral: 'rgba(251,191,36,0.07)' };
      vArea.innerHTML = `
        <div style="background:${bgMap[v.verdict]||'var(--bg1)'};border:1px solid ${colMap[v.verdict]||'var(--rim2)'}22;border-radius:16px;padding:18px;margin-bottom:16px">
          <div style="font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--t3);margin-bottom:12px">AI VERDICT</div>
          <div style="font-size:38px;font-weight:700;letter-spacing:-0.03em;color:${colMap[v.verdict]||'var(--t1)'};margin-bottom:6px">${v.verdict}</div>
          <div style="font-size:12px;color:var(--t2);margin-bottom:14px">${v.headline || ''}</div>
          ${v.insights?.map(ins => {
            const c = {green:'var(--gb)',amber:'var(--aa)',red:'var(--ra)',purple:'var(--pb)'}[ins.color]||'var(--t2)';
            return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid var(--rim)">
              <span style="font-size:16px">${ins.icon}</span>
              <div><div style="font-size:14px;font-weight:700;color:${c}">${ins.value}</div><div style="font-size:11px;color:var(--t3)">${ins.label}</div></div>
            </div>`;
          }).join('')||''}
          <div style="font-size:13px;color:var(--t2);line-height:1.7;margin-top:14px;padding-top:12px;border-top:1px solid var(--rim)">${v.body || ''}</div>
          ${v.pkrContext ? `<div style="font-size:12px;color:var(--gb);margin-top:10px;padding:10px;background:rgba(34,217,138,0.05);border-radius:8px">🇵🇰 ${v.pkrContext}</div>` : ''}
        </div>`;
    } else {
      vArea.innerHTML = `<div style="color:var(--ra);font-size:13px;padding:16px 0">Could not load verdict: ${data.error || 'Unknown error'}</div>`;
    }
  } catch(e) {
    const vArea = document.getElementById('coin-verdict-area');
    if (vArea) vArea.innerHTML = `<div style="color:var(--ra);font-size:13px;padding:16px 0">Failed to load verdict. Please try again.</div>`;
  }
}

async function askCrypto(sym) {
  const input = document.getElementById('crypto-q');
  const answerEl = document.getElementById('crypto-answer');
  if (!input || !answerEl || !input.value.trim()) return;
  const q = input.value.trim();
  answerEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px;color:var(--t3)"><div class="spin" style="width:14px;height:14px;border:2px solid var(--rim2);border-top-color:var(--gb);border-radius:50%;animation:spin 0.8s linear infinite"></div>Thinking…</div>';
  try {
    const res = await fetch('/.netlify/functions/crypto', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'question', symbol: sym, question: q })
    });
    const data = await res.json();
    answerEl.textContent = data.answer || data.error || 'No response';
  } catch(e) {
    answerEl.textContent = 'Error — please try again';
  }
}

// ── FOREX SECTION ─────────────────────────────────────────
async function renderForexSection() {
  const el = document.getElementById('forex-root');
  if (!el) return;

  el.innerHTML = `
    <div class="forex-section">
      <div class="forex-header">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px">FOREX RATES</div>
        <h2>Live FX Rates</h2>
        <p>The 6 currency pairs that matter most to Pakistani investors, businesses, and the diaspora.</p>
      </div>
      <div class="fx-grid" id="fx-grid">
        <div class="fx-loading">
          <div class="spin" style="width:20px;height:20px;border:2px solid var(--rim2);border-top-color:var(--gb);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px"></div>
          Loading live rates…
        </div>
      </div>
      <div class="sbp-note">⚠️ These are interbank mid-market rates. Open market rates in Pakistan may differ by PKR 1–3. SBP sets the managed float — check your bank for transaction rates.</div>
    </div>
    <div class="disc">Rates: ExchangeRate-API · Updated every 2 minutes · Not financial advice</div>`;

  try {
    const res = await fetch('/.netlify/functions/forex', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'rates' })
    });
    const data = await res.json();
    const grid = document.getElementById('fx-grid');
    if (!grid) return;

    if (data.error) {
      grid.innerHTML = `<div style="color:var(--ra);font-size:14px;padding:20px 0">${data.error}</div>`;
      return;
    }

    grid.innerHTML = Object.values(data.rates).map(fx => `
      <div class="fx-card">
        <div class="fx-top">
          <div class="fx-pair-name">
            <span class="fx-flag">${fx.flag}</span>
            <div>
              <div class="fx-pair">${fx.key}</div>
              <div class="fx-label">${fx.label}</div>
            </div>
          </div>
          <div class="fx-rate-block">
            <div class="fx-rate">PKR ${fx.rateRound}</div>
            <div class="fx-sub" style="color:${fx.dir==='up'?'var(--gb)':fx.dir==='dn'?'var(--ra)':'var(--t3)'}">
              ${fx.change != null ? (fx.dir==='up'?'▲':'▼') + ' ' + Math.abs(fx.change) + '%' : '1 ' + fx.base + ' = PKR ' + fx.rateRound}
            </div>
          </div>
        </div>
        <div class="fx-context">${fx.context}</div>
      </div>`).join('');
  } catch(e) {
    const grid = document.getElementById('fx-grid');
    if (grid) grid.innerHTML = `<div style="color:var(--ra);font-size:14px;padding:20px 0">Failed to load rates — please try again</div>`;
  }
}
</script>
</body>
</html>
