<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- WT-VERSION-2.1 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wall-Trade — Pakistan Stock Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:   #09090f;
  --bg1:  #0f0f18;
  --bg2:  #141420;
  --bg3:  #1c1c2e;
  --bg4:  #242438;
  --rim:  rgba(255,255,255,0.06);
  --rim2: rgba(255,255,255,0.1);

  --t1: #eeedf8;
  --t2: rgba(238,237,248,0.5);
  --t3: rgba(238,237,248,0.25);
  --t4: rgba(238,237,248,0.1);

  /* green ramp */
  --ga: #5fffc0;
  --gb: #22d98a;
  --gc: #0faa66;

  /* purple ramp */
  --pa: #c4b5fd;
  --pb: #8b5cf6;
  --pc: #6d28d9;

  /* red */
  --ra: #ff8080;
  --rb: #ef4444;

  /* amber */
  --aa: #fbbf24;
  --ab: #d97706;

  /* blue */
  --ba: #93c5fd;
  --bb: #3b82f6;

  /* cyan — Hold signal */
  --ca: #67e8f9;
  --cb: #0891b2;

  --card-shadow: 0 0 0 1px var(--rim2), 0 2px 8px rgba(0,0,0,0.5), 0 12px 32px rgba(0,0,0,0.3);
  --float-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 4px 16px rgba(0,0,0,0.6), 0 24px 64px rgba(0,0,0,0.4);
}

html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Geist', 'SF Pro Display', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 0; }

/* ── GRADIENT TEXT ── */
.gx-green  { background: linear-gradient(130deg, var(--ga) 0%, var(--gb) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-purple { background: linear-gradient(130deg, var(--pa) 0%, var(--pb) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-red    { background: linear-gradient(130deg, var(--ra) 0%, var(--rb) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-amber  { background: linear-gradient(130deg, var(--aa) 0%, var(--ab) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-blue   { background: linear-gradient(130deg, var(--ba) 0%, var(--bb) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-beige  { background: linear-gradient(130deg, #e8dcc8 0%, #c4a882 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-coral  { background: linear-gradient(130deg, #fda4af 0%, #fb7185 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-cyan   { background: linear-gradient(130deg, #a5f3fc 0%, #22d3ee 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-white  { background: linear-gradient(130deg, #ffffff 30%, rgba(238,237,248,0.55) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gx-mixed  { background: linear-gradient(130deg, var(--ga) 0%, var(--pa) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

/* ── HEADER ── */
.hdr {
  position: sticky; top: 0; z-index: 80;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  background: rgba(9,9,15,0.9);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--rim);
}
.logo {
  font-size: 18px; font-weight: 700; letter-spacing: -0.04em;
  background: linear-gradient(130deg, var(--ga), var(--pa));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hdr-pill {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg2); border: 1px solid var(--rim2);
  border-radius: 50px; padding: 6px 12px 6px 7px;
  cursor: pointer; transition: background 0.15s;
  box-shadow: var(--card-shadow);
}
.hdr-pill:hover { background: var(--bg3); }
.pill-av {
  width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(95,255,192,0.15), rgba(139,92,246,0.15));
  border: 1px solid var(--rim2);
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: 700;
  background-clip: unset;
  color: var(--pa);
}
.pill-lbl { font-size: 12px; font-weight: 600; color: var(--t1); letter-spacing: -0.01em; }
.pill-arrow { font-size: 9px; color: var(--t3); }


/* ── LIVE TICKER BAR ── */
.ticker-bar {
  width: 100%; overflow: hidden;
  background: var(--bg1);
  border-bottom: 1px solid var(--rim);
  padding: 7px 0;
  position: relative;
}
.ticker-bar::before, .ticker-bar::after {
  content: '';
  position: absolute; top: 0; width: 40px; height: 100%; z-index: 2;
  pointer-events: none;
}
.ticker-bar::before { left: 0; background: linear-gradient(to right, var(--bg1), transparent); }
.ticker-bar::after  { right: 0; background: linear-gradient(to left, var(--bg1), transparent); }
.ticker-track {
  display: flex; gap: 0;
  animation: tickerScroll 30s linear infinite;
  width: max-content;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes tickerScroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  display: flex; align-items: center; gap: 6px;
  padding: 0 20px; white-space: nowrap;
  font-size: 11px; font-weight: 600; letter-spacing: -0.01em;
  cursor: pointer;
  border-right: 1px solid var(--rim);
}
.ticker-item:hover { background: rgba(255,255,255,0.03); }
.ticker-name { color: var(--t2); }
.ticker-price { color: var(--t1); }
.ticker-chg { font-size: 10px; font-weight: 700; }
.ticker-dot {
  width: 5px; height: 5px; border-radius: 50%;
  animation: tickerPulse 1.5s ease-in-out infinite;
}
@keyframes tickerPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* KSE-100 badge */
.kse-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px 0 20px; white-space: nowrap;
  font-size: 11px; font-weight: 700;
  border-right: 1px solid var(--rim);
}
.kse-label { color: var(--t3); letter-spacing: 0.05em; font-size: 9px; text-transform: uppercase; }
.kse-value { color: var(--t1); }

/* ── OVERLAY / SHEET ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; backdrop-filter: blur(8px); }
.overlay.on { display: block; }
.sheet {
  display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--bg1); border: 1px solid var(--rim2); border-bottom: none;
  border-radius: 22px 22px 0 0;
  padding: 0 0 44px; z-index: 201;
  max-height: 76vh; overflow-y: auto;
  box-shadow: var(--float-shadow);
}
.sheet-bar { width: 32px; height: 3px; background: var(--rim2); border-radius: 2px; margin: 12px auto 20px; }
.sheet-ttl { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); padding: 0 20px 10px; }
.si { display: flex; align-items: center; justify-content: space-between; padding: 13px 20px; cursor: pointer; transition: background 0.1s; }
.si:hover, .si.on { background: rgba(255,255,255,0.03); }
.si-l { display: flex; align-items: center; gap: 13px; }
.si-av {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(95,255,192,0.1), rgba(139,92,246,0.15));
  border: 1px solid var(--rim2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: var(--pa);
  box-shadow: var(--card-shadow);
}
.si-tick { font-size: 14px; font-weight: 600; color: var(--t1); letter-spacing: -0.02em; }
.si-name { font-size: 11px; color: var(--t3); margin-top: 1px; }
.si-pr { font-size: 13px; font-weight: 500; color: var(--t1); text-align: right; }
.si-ch { font-size: 11px; font-weight: 500; margin-top: 2px; text-align: right; }
.up { color: var(--gb); } .dn { color: var(--ra); }

/* ── HERO ── */
.hero { padding: 28px 20px 18px; }
.hero-meta { font-size: 11px; font-weight: 400; color: var(--t3); letter-spacing: 0.02em; margin-bottom: 16px; }
.hero-row { display: flex; justify-content: space-between; align-items: flex-start; }
.hero-ticker { font-size: 48px; font-weight: 700; letter-spacing: -0.05em; line-height: 0.95; }
.hero-sector {
  font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--t3); margin-top: 10px;
  display: flex; align-items: center; gap: 7px;
}
.hero-sector-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--pb); }
.hero-r { text-align: right; }
.hero-price { font-size: 36px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; }
.hero-cur { font-size: 11px; color: var(--t3); margin-bottom: 3px; letter-spacing: 0.04em; }
.hero-chg { font-size: 12px; font-weight: 600; margin-top: 6px; }

/* ── TABS ── */
.tabs {
  display: flex; padding: 0 20px;
  border-bottom: 1px solid var(--rim);
  margin-bottom: 24px;
}
.tab {
  font-size: 13px; font-weight: 500; color: var(--t3);
  padding: 12px 14px; cursor: pointer;
  border-bottom: 1.5px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  letter-spacing: -0.01em;
}
.tab.on {
  border-bottom-color: var(--gb);
  background: linear-gradient(130deg, var(--ga), var(--pa));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.tcontent { display: none; }
.tcontent.on { display: block; }

/* ── SUGGESTION CARD ── */
.sc-wrap { padding: 0 20px 4px; }
.sc { overflow: hidden; background: transparent; border: none; box-shadow: none; }
.sc-top { padding: 8px 0 20px; }
.sc-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--t3); margin-bottom: 18px; }
.sc-verdict-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.sc-verdict { font-size: 52px; font-weight: 700; letter-spacing: -0.03em; line-height: 0.9; }

.sc-sep { height: 1px; background: linear-gradient(90deg, transparent, var(--rim2) 25%, var(--rim2) 75%, transparent); margin: 4px 0; }
.sc-bot { padding: 18px 0 20px; }

.ai-row {
  display: flex; align-items: center; gap: 7px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 12px;
  background: linear-gradient(130deg, var(--pa), var(--pb));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.ai-orb {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--pa), var(--pb));
  animation: orb 2.5s ease-in-out infinite;
  box-shadow: 0 0 6px var(--pb);
}
@keyframes orb { 0%,100%{opacity:1;box-shadow:0 0 6px var(--pb)} 50%{opacity:0.4;box-shadow:none} }

.ai-headline {
  font-size: 16px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.45;
  background: linear-gradient(130deg, var(--t1) 40%, var(--t2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 10px;
}
.ai-body { font-size: 13px; color: var(--t2); line-height: 1.8; font-weight: 400; }
.ai-loading { display: flex; align-items: center; gap: 10px; color: var(--t3); font-size: 12px; }
.spin { width: 13px; height: 13px; border: 1.5px solid var(--rim2); border-top-color: var(--pb); border-radius: 50%; flex-shrink: 0; animation: rot .7s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }

/* ── SIGNALS ── */
.sigs-wrap { padding: 20px 20px 24px; }
.sec-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--t3); margin-bottom: 13px; }
.sigs { display: flex; flex-wrap: wrap; gap: 7px; }
.spill {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; font-weight: 500; color: var(--t2);
  background: var(--bg2); border: 1px solid var(--rim2);
  padding: 6px 12px; border-radius: 50px;
  box-shadow: 0 0 0 1px var(--rim), 0 2px 6px rgba(0,0,0,0.4);
  letter-spacing: -0.01em;
}
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* ── RATIO GRID ── */
.ratio-wrap { padding: 0 20px 4px; }
.rgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.rcard {
  background: var(--bg2); border: 1px solid var(--rim2);
  border-radius: 16px; padding: 15px 16px;
  box-shadow: var(--card-shadow);
}
.rlbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); margin-bottom: 8px; }
.rval { font-size: 22px; font-weight: 700; letter-spacing: -0.04em; line-height: 1; margin-bottom: 5px; }
.rctx { font-size: 10px; font-weight: 500; }

/* ── SCORES ── */
.scores-wrap { padding: 22px 20px 6px; }
.score-item { margin-bottom: 16px; }
.score-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.score-name { font-size: 13px; color: var(--t2); font-weight: 400; letter-spacing: -0.01em; }
.score-num { font-size: 12px; font-weight: 600; color: var(--t1); }
.strack { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.sfill { height: 100%; border-radius: 2px; transition: width 1.1s cubic-bezier(0.4,0,0.2,1); }

/* ── OVERALL ── */
.overall-wrap { padding: 14px 20px 28px; }
.ocard {
  background: var(--bg1); border: 1px solid var(--rim2);
  border-radius: 20px; padding: 22px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--float-shadow);
}
.onum { font-size: 64px; font-weight: 700; letter-spacing: -0.05em; line-height: 0.9; }
.oden { font-size: 20px; font-weight: 400; color: var(--t3); }
.oright { text-align: right; max-width: 172px; }
.o-eye { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); margin-bottom: 7px; }
.o-desc { font-size: 13px; color: var(--t2); line-height: 1.65; font-weight: 400; }

/* ── FACTORS ── */
.factors-wrap { padding: 0 20px 28px; }
.fi { display: flex; gap: 15px; padding: 18px 0; border-bottom: 1px solid var(--rim); }
.fi:last-child { border-bottom: none; padding-bottom: 4px; }
.fi-icon {
  width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
  background: linear-gradient(135deg, rgba(95,255,192,0.08), rgba(139,92,246,0.12));
  border: 1px solid var(--rim2);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: var(--card-shadow);
}
.fi-title { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; color: var(--t1); margin-bottom: 5px; }
.fi-desc { font-size: 12px; color: var(--t2); line-height: 1.75; }

/* ── ANSWER ── */
.ans-wrap { padding: 0 20px 8px; display: none; }
.ans-wrap.on { display: block; }
.ans-lbl {
  display: flex; align-items: center; gap: 6px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 10px;
  background: linear-gradient(130deg, var(--pa), var(--pb));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.ans-card {
  background: var(--bg2); border: 1px solid var(--rim2);
  border-radius: 16px; padding: 16px 18px;
  font-size: 13px; color: var(--t2); line-height: 1.8;
  box-shadow: var(--card-shadow);
}

/* ── ASK BAR ── */
.ask-bar {
  position: sticky; bottom: 0; z-index: 70;
  padding: 14px 20px 22px;
  background: rgba(9,9,15,0.94);
  backdrop-filter: blur(24px);
  border-top: 1px solid var(--rim);
}
.ask-row { display: flex; gap: 9px; }
.ask-in {
  flex: 1; background: var(--bg2); border: 1px solid var(--rim2);
  border-radius: 12px; color: var(--t1);
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 14px; padding: 12px 15px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: var(--card-shadow);
}
.ask-in::placeholder { color: var(--t4); }
.ask-in:focus { border-color: rgba(139,92,246,0.35); box-shadow: 0 0 0 3px rgba(139,92,246,0.07); }
.ask-btn {
  background: linear-gradient(130deg, #a78bfa, #7c3aed);
  color: #ffffff;
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 13px; font-weight: 700;
  padding: 12px 22px; border-radius: 12px;
  border: none; cursor: pointer;
  letter-spacing: -0.01em;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 2px 16px rgba(124,58,237,0.45), 0 1px 4px rgba(0,0,0,0.4);
  white-space: nowrap;
}
.ask-btn:hover { opacity: 0.88; }
.ask-btn:active { transform: scale(0.97); }
.ask-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.disc { font-size: 10px; color: var(--t3); text-align: center; padding: 6px 20px 28px; line-height: 1.7; }

/* ── GAUGE ── */
.gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.gauge-svg { display: block; }
.gauge-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); }

/* ── INSIGHT CARDS — left border accent ── */
.insights { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.insight-card {
  display: flex; align-items: center; gap: 14px;
  background: rgba(255,255,255,0.02);
  border: none;
  border-left: 3px solid transparent;
  border-radius: 0 8px 8px 0;
  padding: 11px 14px;
  transition: background 0.15s;
}
.insight-card:hover { background: rgba(255,255,255,0.04); }
.insight-icon-wrap {
  width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; background: transparent;
}
.insight-right { flex: 1; min-width: 0; }
.insight-value {
  font-size: 14px; font-weight: 700; letter-spacing: -0.02em; line-height: 1;
  margin-bottom: 3px;
}
.insight-label { font-size: 11px; color: var(--t2); line-height: 1.45; font-weight: 400; }
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">Wall-Trade</div>
  <div class="hdr-pill" id="hdr-pill" onclick="openSheet()">
    <div class="pill-av" id="pill-av">OGD</div>
    <span class="pill-lbl" id="pill-lbl">OGDC</span>
    <span class="pill-arrow">▾</span>
  </div>
</header>

<div class="ticker-bar" id="ticker-bar"><div class="ticker-track" id="ticker-track"><div class="kse-badge"><span class="kse-label">KSE-100</span><span class="kse-value" id="kse-val">—</span><span class="ticker-chg up" id="kse-chg"></span></div></div></div>

<div class="overlay" id="overlay" onclick="closeSheet()" ontouchend="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-bar"></div>
  <div class="sheet-ttl">Energy &amp; Oil · PSX</div>
  <div id="sheet-list"></div>
</div>

<div id="root"></div>

<script>
// ── POPULAR PSX STOCKS (for quick browse) ──────────────────
const POPULAR = {
  'Energy & Oil':    ['OGDC','PPL','PSO','MARI','APL','HASCOL','SNGP','SSGC'],
  'Banking':         ['HBL','MCB','UBL','NBP','ABL','BAFL','BAHL','MEBL','FABL'],
  'Fertiliser':      ['ENGRO','FFBL','FFC','EFERT'],
  'Cement':          ['LUCK','MLCF','CHCC','DGKC','PIOC','FCCL'],
  'Technology':      ['TRG','SYS','NETSOL'],
  'Other':           ['PAKT','PNSC']
};

const ALL_TICKERS = Object.values(POPULAR).flat();

// ── STATE ──────────────────────────────────────────────────
let cur = 'OGDC';
let tab = 'overview';
let stockCache = {};      // stockData per ticker
let verdictCache = {};    // AI verdict per ticker
let livePrices = {};      // live prices from prices.js

// ── MACRO CONTEXT (static, updated periodically) ──────────
const MACRO = [
  "SBP Policy Rate: 10.50% p.a. | Ceiling: 11.50% | Floor: 9.50%",
  "Monetary policy: Aggressive easing cycle from 22% peak to 10.50%",
  "IMF EFF programme: Active — energy reforms, circular debt reduction, DISCO privatisation",

  "Inflation CPI: ~8-10%, down sharply from 38% peak",

// ── GAUGE ──────────────────────────────────────────────────
function gaugeArc(score) {
  const pct = Math.min(score / 10, 1);
  const W=140, H=90, cx=70, cy=76, R=50, n=22;
  const id = 'gg' + Math.random().toString(36).slice(2,8);
  let dots = '';
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1);
    const angle = Math.PI + t * Math.PI;
    const x = cx + R * Math.cos(angle);
    const y = cy + R * Math.sin(angle);
    const lit = t <= pct;
    const col = t < 0.42 ? '#ff4444' : t < 0.58 ? '#ffaa00' : '#00e87a';
    const r = lit ? 5 : 4;
    const op = lit ? '1' : '0.13';
    const glow = lit ? ` filter="url(#${id}-glow)"` : '';
    dots += `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r}" fill="${col}" opacity="${op}"${glow}/>`;
  }
  const na = Math.PI + pct * Math.PI;
  const nx = (cx + 36 * Math.cos(na)).toFixed(2);
  const ny = (cy + 36 * Math.sin(na)).toFixed(2);
  return `<div class="gauge-wrap">
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="none">
      <defs><filter id="${id}-glow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter></defs>
      ${dots}
      <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#e8eeff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="#1c1c2e" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
      <circle cx="${cx}" cy="${cy}" r="2.5" fill="#ffffff"/>
    </svg>
    <div class="gauge-label">${score} / 10</div>
  </div>`;
}

// ── BUILD RATIOS FROM STOCK DATA ───────────────────────────
function buildRatios(s) {
  const ratios = {};
  if (s.pe && s.pe !== 'N/A')          ratios['P/E Ratio']     = { v: s.pe + '×',    c: parseFloat(s.pe) < 15 ? 'green' : parseFloat(s.pe) < 25 ? 'amber' : 'red', ctx: 'Price to earnings' };
  if (s.pb && s.pb !== 'N/A')          ratios['P/B Ratio']     = { v: s.pb + '×',    c: parseFloat(s.pb) < 2 ? 'green' : parseFloat(s.pb) < 4 ? 'amber' : 'red',    ctx: 'Price to book value' };
  if (s.divYield && s.divYield !== 'N/A') ratios['Div Yield']  = { v: s.divYield,    c: parseFloat(s.divYield) > 5 ? 'green' : 'amber',                               ctx: 'Annual dividend yield' };
  if (s.roe && s.roe !== 'N/A')        ratios['ROE']           = { v: s.roe,         c: parseFloat(s.roe) > 15 ? 'green' : parseFloat(s.roe) > 8 ? 'amber' : 'red',  ctx: 'Return on equity' };
  if (s.netMargin && s.netMargin !== 'N/A') ratios['Net Margin'] = { v: s.netMargin, c: parseFloat(s.netMargin) > 15 ? 'green' : parseFloat(s.netMargin) > 5 ? 'amber' : 'red', ctx: 'Net profit margin' };
  if (s.currentRatio && s.currentRatio !== 'N/A') ratios['Current Ratio'] = { v: s.currentRatio + '×', c: parseFloat(s.currentRatio) > 1.5 ? 'green' : parseFloat(s.currentRatio) > 1 ? 'amber' : 'red', ctx: 'Short-term liquidity' };
  if (s.debtToEquity && s.debtToEquity !== 'N/A') ratios['Debt / Equity'] = { v: s.debtToEquity, c: parseFloat(s.debtToEquity) < 0.5 ? 'green' : parseFloat(s.debtToEquity) < 1.5 ? 'amber' : 'red', ctx: 'Financial leverage' };
  if (s.grossMargin && s.grossMargin !== 'N/A') ratios['Gross Margin'] = { v: s.grossMargin, c: parseFloat(s.grossMargin) > 30 ? 'green' : parseFloat(s.grossMargin) > 10 ? 'amber' : 'red', ctx: 'Gross profit margin' };
  return ratios;
}

// ── LOAD STOCK DYNAMICALLY ─────────────────────────────────
async function loadStock(ticker) {
  // Check cache first
  if (stockCache[ticker] && verdictCache[ticker]) {
    render(ticker, stockCache[ticker], verdictCache[ticker]);
    return;
  }

  renderLoading(ticker);

  try {
    const res = await fetch('/.netlify/functions/stock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker, macroContext: MACRO })
    });

    if (res.status === 404) {
      const err = await res.json();
      renderError(ticker, err.error);
      return;
    }

    if (!res.ok) throw new Error('Server error');

    const data = await res.json();
    stockCache[ticker]  = data.stockData;
    verdictCache[ticker] = data.verdict;
    render(ticker, data.stockData, data.verdict);

    // Update pill with latest price
    if (data.stockData?.price) {
      livePrices[ticker] = {
        price:  data.stockData.price,
        change: data.stockData.change,
        dir:    data.stockData.dir
      };
    }
  } catch(e) {
    renderError(ticker, 'Unable to connect. Please check your connection and try again.');
  }
}

// ── ASK QUESTION ──────────────────────────────────────────
async function doAsk() {
  const inp = document.getElementById('ask-in'), btn = document.getElementById('ask-btn');
  const q = inp.value.trim(); if (!q) return;
  btn.disabled = true; btn.textContent = '…';
  const aw = document.getElementById('ans-wrap'), ac = document.getElementById('ans-card');
  aw.classList.add('on'); ac.textContent = 'Thinking…';
  const s = stockCache[cur];
  try {
    const res = await fetch('/.netlify/functions/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'question', ticker: cur, question: q,
        ratios: s ? Object.entries(buildRatios(s)).map(([k,v])=>`${k}: ${v.v}`).join(', ') : '',
        macro: MACRO
      })
    });
    if (res.status === 429) { ac.textContent = 'Usage limit reached. Please try again in an hour.'; btn.disabled = false; btn.textContent = 'Ask'; return; }
    const data = await res.json();
    ac.textContent = data.content?.map(i => i.text||'').join('') || 'Could not get a response.';
  } catch(e) { ac.textContent = 'Could not connect — please try again.'; }
  btn.disabled = false; btn.textContent = 'Ask'; inp.value = '';
}

// ── SHEET (STOCK PICKER) ──────────────────────────────────
function buildSheet() {
  const list = document.getElementById('sheet-list');
  list.innerHTML = '';

  // Search box
  const searchDiv = document.createElement('div');
  searchDiv.style.cssText = 'padding:12px 20px 4px';
  searchDiv.innerHTML = `<input id="sheet-search" type="text" placeholder="Search any PSX ticker (e.g. HBL, LUCK)…" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#eeedf8;font-size:13px;padding:10px 14px;outline:none;font-family:inherit">`;
  list.appendChild(searchDiv);

  // Sector groups
  Object.entries(POPULAR).forEach(([sector, tickers]) => {
    const secDiv = document.createElement('div');
    secDiv.innerHTML = `<div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(238,237,248,0.25);padding:14px 20px 6px">${sector}</div>`;
    list.appendChild(secDiv);

    tickers.forEach(ticker => {
      const d = document.createElement('div');
      d.className = 'si' + (ticker === cur ? ' on' : '');
      d.dataset.ticker = ticker;
      const lp = livePrices[ticker];
      const priceDisplay = lp ? `PKR ${lp.price}` : '—';
      const chgDisplay   = lp ? `${lp.dir==='up'?'+':''}${lp.change}%` : '';
      const chgClass     = lp ? (lp.dir==='up'?'up':'dn') : '';
      d.innerHTML = `<div class="si-l"><div class="si-av">${ticker.slice(0,3)}</div><div><div class="si-tick">${ticker}</div><div class="si-name">${getShortName(ticker)}</div></div></div><div><div class="si-pr">${priceDisplay}</div><div class="si-ch ${chgClass}">${chgDisplay}</div></div>`;
      const handler = (e) => { e.preventDefault(); e.stopPropagation(); select(ticker); };
      d.addEventListener('click', handler);
      d.addEventListener('touchend', handler, { passive: false });
      list.appendChild(d);
    });
  });

  // Search functionality
  setTimeout(() => {
    const searchInput = document.getElementById('sheet-search');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const q = e.target.value.toUpperCase().trim();
        if (!q) {
          list.querySelectorAll('.si').forEach(el => el.style.display = '');
          list.querySelectorAll('[style*="font-size:9px"]').forEach(el => el.style.display = '');
          return;
        }
        list.querySelectorAll('.si').forEach(el => {
          el.style.display = el.dataset.ticker?.includes(q) ? '' : 'none';
        });
        list.querySelectorAll('[style*="font-size:9px"]').forEach(el => el.style.display = 'none');

        // If not in popular list, show "Search PSX" option
        const found = list.querySelectorAll('.si:not([style*="none"])').length;
        let customEl = document.getElementById('custom-search-item');
        if (!found && q.length >= 2) {
          if (!customEl) {
            customEl = document.createElement('div');
            customEl.id = 'custom-search-item';
            customEl.className = 'si';
            list.appendChild(customEl);
          }
          customEl.innerHTML = `<div class="si-l"><div class="si-av" style="background:rgba(139,92,246,0.15);color:#8b5cf6">PSX</div><div><div class="si-tick">${q}</div><div class="si-name">Search PSX for ${q}</div></div></div><div style="font-size:10px;color:rgba(238,237,248,0.3)">↵ Search</div>`;
          customEl.style.display = '';
          const handler = (e) => { e.preventDefault(); select(q); };
          customEl.onclick = handler;
          customEl.ontouchend = handler;
        } else if (customEl) {
          customEl.style.display = 'none';
        }
      });
    }
  }, 50);
}

    </div>`;
  }).filter(Boolean).join('');

  const kseHtml = kse100 ? `<div class="kse-badge"><span class="kse-label">KSE-100</span><span class="kse-value" id="kse-val">${kse100.price}</span><span class="ticker-chg ${kse100.dir==='up'?'up':'dn'}" id="kse-chg">${parseFloat(kse100.change)>=0?'+':''}${kse100.change}%</span></div>` : '';

  track.innerHTML = kseHtml + items + items;
}

// ── SHEET TITLE UPDATE ─────────────────────────────────────
function updateSheetTitle() {
  const el = document.querySelector('.sheet-ttl');
  if (el) el.textContent = 'Select a stock · PSX';
}

// ── INIT ──────────────────────────────────────────────────
updateSheetTitle();
fetchLivePrices();
setInterval(fetchLivePrices, 60000);
select('OGDC');
</script>
