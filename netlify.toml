[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "zisi"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/.netlify/functions/prices"
  [headers.values]
    Cache-Control = "public, max-age=30"

[functions."analyze"]
  timeout = 26

[functions."stock"]
  timeout = 26

[functions."crypto"]
  timeout = 26

[functions."prices"]
  timeout = 26

[functions."news"]
  timeout = 15

[functions."auth"]
  timeout = 10

[functions."forex"]
  timeout = 15
